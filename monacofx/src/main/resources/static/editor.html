<!DOCTYPE html>
<!--suppress ALL -->
<html>
<head>
    <meta charset="UTF-8">
    <style>
        html, body, #container {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div id="container"></div>

<script>
    // 解决 WebView worker 问题（必须）
    self.MonacoEnvironment = {
        getWorker: function () {
            return new Worker(
                URL.createObjectURL(
                    new Blob(
                        ['self.onmessage=function(){}'],
                        { type: 'text/javascript' }
                    )
                )
            );
        }
    };
</script>

<script>
    var require = { paths: { vs: './vs' } };
</script>
<script src="./vs/loader.js"></script>
<script src="./keywords.js"></script>

<script>
    require(['vs/editor/editor.main'], function () {
        window.editor = monaco.editor.create(
            document.getElementById('container'), {
                value: '',
                language: 'sql',
                automaticLayout: true,
                roundedSelection: false,
                mouseWheelScrollSensitivity: 0.03,
                scrollBeyondLastLine: false,
                scrollbar: {
                    useShadows: true,
                    verticalHasArrows: true,
                    horizontalHasArrows: true,
                    vertical: 'auto',
                    horizontal: 'auto',
                    verticalScrollbarSize: 17,
                    horizontalScrollbarSize: 17,
                    arrowSize: 30,
                    alwaysConsumeMouseWheel: false
                }
            }
        );

        monaco.languages.registerCompletionItemProvider('sql', {
            triggerCharacters: [' ', '.'],

            provideCompletionItems: function(model, position) {
                const word = model.getWordUntilPosition(position);

                const range = {
                    startLineNumber: position.lineNumber,
                    endLineNumber: position.lineNumber,
                    startColumn: word.startColumn,
                    endColumn: word.endColumn
                };

                const suggestions = Array.from(window.SqlKeywords).map(item => {
                    return {
                        label: item.label,
                        kind: getKind(item.kind),
                        insertText: item.label,
                        detail: item.detail,
                        range: range
                    };
                });

                function getKind(kind) {
                    const kinds = {
                        'Keyword': monaco.languages.CompletionItemKind.Keyword,
                        'Function': monaco.languages.CompletionItemKind.Function,
                        'Operator': monaco.languages.CompletionItemKind.Operator,
                        'Class': monaco.languages.CompletionItemKind.Class,
                        'Field': monaco.languages.CompletionItemKind.Field,
                        'Module': monaco.languages.CompletionItemKind.Module
                    };
                    return kinds[kind] || monaco.languages.CompletionItemKind.Keyword;
                }

                return {
                    suggestions: suggestions
                };
            }
        });

        /**
         * Ctrl/Cmd + W
         * 智能扩大选择
         */
        editor.addAction({
            id: 'smart-select-expand',
            label: 'Expand Selection',
            keybindings: [
                monaco.KeyMod.CtrlCmd |
                monaco.KeyCode.KeyW
            ],
            run: function (editor) {

                editor.trigger(
                    'keyboard',
                    'editor.action.smartSelect.expand',
                    {}
                );
            }
        });

        /**
         * Ctrl/Cmd + Shift + W
         * 缩小选择
         */
        editor.addAction({
            id: 'smart-select-shrink',
            label: 'Shrink Selection',
            keybindings: [
                monaco.KeyMod.CtrlCmd |
                monaco.KeyMod.Shift |
                monaco.KeyCode.KeyW
            ],
            run: function (editor) {
                editor.trigger(
                    'keyboard',
                    'editor.action.smartSelect.shrink',
                    {}
                );
            }
        });

        /**
         * Alt + Shift + Up
         * 上方插入多光标
         */
        editor.addAction({
            id: 'insert-cursor-above',
            label: 'Insert Cursor Above',
            keybindings: [
                monaco.KeyMod.Alt | monaco.KeyMod.Shift |
                monaco.KeyCode.UpArrow
            ],
            run: function (editor) {
                editor.trigger(
                    'keyboard',
                    'editor.action.insertCursorAbove',
                    {}
                );
            }
        });

        /**
         * Alt + Shift + Down
         * 下方插入多光标
         */
        editor.addAction({
            id: 'insert-cursor-below',
            label: 'Insert Cursor Below',
            keybindings: [
                monaco.KeyMod.Alt | monaco.KeyMod.Shift |
                monaco.KeyCode.DownArrow
            ],
            run: function (editor) {
                editor.trigger(
                    'keyboard',
                    'editor.action.insertCursorBelow',
                    {}
                );
            }
        });

        /**
         * Ctrl + D
         * 复制一行
         */
        editor.addAction({
            id: 'duplicate-line',
            label: 'Duplicate Line',
            keybindings: [
                monaco.KeyMod.CtrlCmd |
                monaco.KeyCode.KeyD
            ],
            run: function(editor) {

                editor.trigger(
                    'keyboard',
                    'editor.action.copyLinesDownAction',
                    {}
                );
            }
        });

        /**
         * Ctrl + Shift + U
         * 大小写转换
         */
        editor.addAction({
            id: 'toggle-case',
            label: 'Toggle CASE',
            keybindings: [
                monaco.KeyMod.Shift |
                monaco.KeyMod.CtrlCmd |
                monaco.KeyCode.KeyU
            ],
            run: function (editor) {
                const selections = editor.getSelections();
                const edits = [];

                selections.forEach(sel => {

                    const text = editor.getModel().getValueInRange(sel);

                    if (!text)
                        return;

                    let newText;

                    const hasUpper = /[A-Z]/.test(text);
                    const hasLower = /[a-z]/.test(text);

                    if (hasUpper && !hasLower) {
                        newText = text.toLowerCase();
                    } else {
                        newText = text.toUpperCase();
                    }

                    edits.push({
                        range: sel,
                        text: newText
                    });
                });

                editor.executeEdits('toggle-case', edits);
            }
        });

        editor.layout();
    });
</script>
</body>
</html>
