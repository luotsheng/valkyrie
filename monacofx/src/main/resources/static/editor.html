<!DOCTYPE html>
<!--suppress ALL -->
<html>
<head>
    <meta charset="UTF-8">
    <style>
        html, body, #container {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div id="container"></div>

<script>
    // 解决 WebView worker 问题（必须）
    self.MonacoEnvironment = {
        getWorker: function () {
            return new Worker(
                URL.createObjectURL(
                    new Blob(
                        ['self.onmessage=function(){}'],
                        { type: 'text/javascript' }
                    )
                )
            );
        }
    };
</script>

<script>
    var require = { paths: { vs: './vs' } };
</script>
<script src="./vs/loader.js"></script>

<script>
    require(['vs/editor/editor.main'], function () {
        window.editor = monaco.editor.create(
            document.getElementById('container'),
            {
                value: '',
                language: 'sql',
                automaticLayout: true,
                roundedSelection: false,
                mouseWheelScrollSensitivity: 0.03,
                scrollBeyondLastLine: false,
                scrollbar: {
                    useShadows: true,
                    verticalHasArrows: true,
                    horizontalHasArrows: true,
                    vertical: 'auto',
                    horizontal: 'auto',
                    verticalScrollbarSize: 17,
                    horizontalScrollbarSize: 17,
                    arrowSize: 30,
                    alwaysConsumeMouseWheel: false
                }
            }
        );

        /**
         * Ctrl/Cmd + W
         * 智能扩大选择
         */
        editor.addAction({
            id: 'smart-select-expand',
            label: 'Expand Selection',
            keybindings: [
                monaco.KeyMod.CtrlCmd |
                monaco.KeyCode.KeyW
            ],
            run: function (editor) {

                editor.trigger(
                    'keyboard',
                    'editor.action.smartSelect.expand',
                    {}
                );
            }
        });

        /**
         * Ctrl/Cmd + Shift + W
         * 缩小选择
         */
        editor.addAction({
            id: 'smart-select-shrink',
            label: 'Shrink Selection',
            keybindings: [
                monaco.KeyMod.CtrlCmd |
                monaco.KeyMod.Shift |
                monaco.KeyCode.KeyW
            ],
            run: function (editor) {
                editor.trigger(
                    'keyboard',
                    'editor.action.smartSelect.shrink',
                    {}
                );
            }
        });

        /**
         * Alt + Shift + Up
         * 上方插入多光标
         */
        editor.addAction({
            id: 'insert-cursor-above',
            label: 'Insert Cursor Above',
            keybindings: [
                monaco.KeyMod.Alt | monaco.KeyMod.Shift |
                monaco.KeyCode.UpArrow
            ],
            run: function (editor) {
                editor.trigger(
                    'keyboard',
                    'editor.action.insertCursorAbove',
                    {}
                );
            }
        });

        /**
         * Alt + Shift + Down
         * 下方插入多光标
         */
        editor.addAction({
            id: 'insert-cursor-below',
            label: 'Insert Cursor Below',
            keybindings: [
                monaco.KeyMod.Alt | monaco.KeyMod.Shift |
                monaco.KeyCode.DownArrow
            ],
            run: function (editor) {
                editor.trigger(
                    'keyboard',
                    'editor.action.insertCursorBelow',
                    {}
                );
            }
        });

        /**
         * Ctrl + D
         * 复制一行
         */
        editor.addAction({
            id: 'duplicate-line',
            label: 'Duplicate Line',
            keybindings: [
                monaco.KeyMod.CtrlCmd |
                monaco.KeyCode.KeyD
            ],
            run: function(editor) {

                editor.trigger(
                    'keyboard',
                    'editor.action.copyLinesDownAction',
                    {}
                );
            }
        });

        editor.layout();
    });
</script>
</body>
</html>
